<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenCLAW Mission Control</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a1a2e;color:#e0e0e0;font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Consolas,monospace;font-size:13px;padding:12px;line-height:1.5}
  h1{color:#0ff;font-size:18px;text-align:center;padding:8px 0;letter-spacing:2px}
  .subtitle{text-align:center;color:#666;font-size:11px;margin-bottom:16px}
  .card{background:#16213e;border:1px solid #0f3460;border-radius:6px;margin-bottom:12px;overflow:hidden}
  .card-header{background:#0f3460;padding:8px 12px;font-weight:bold;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#0ff;display:flex;justify-content:space-between;align-items:center}
  .card-body{padding:10px 12px}
  .badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:bold}
  .badge-green{background:#064e3b;color:#34d399}
  .badge-yellow{background:#78350f;color:#fbbf24}
  .badge-red{background:#7f1d1d;color:#f87171}
  .badge-gray{background:#374151;color:#9ca3af}
  .badge-pass{background:#064e3b;color:#34d399}
  .badge-fail{background:#7f1d1d;color:#f87171}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;color:#888;font-size:11px;padding:4px 8px;border-bottom:1px solid #0f3460}
  td{padding:4px 8px;font-size:12px;border-bottom:1px solid #0f3460aa}
  tr:last-child td{border-bottom:none}
  .bar-container{width:100%;height:14px;background:#0f3460;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
  .bar-fill{height:100%;border-radius:3px;transition:width .3s}
  .bar-green{background:linear-gradient(90deg,#064e3b,#34d399)}
  .bar-yellow{background:linear-gradient(90deg,#78350f,#fbbf24)}
  .bar-red{background:linear-gradient(90deg,#7f1d1d,#f87171)}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
  .stat-item{background:#1a1a2e;padding:8px 10px;border-radius:4px;border:1px solid #0f3460}
  .stat-label{color:#888;font-size:10px;text-transform:uppercase}
  .stat-value{color:#e0e0e0;font-size:18px;font-weight:bold}
  .stat-value.highlight{color:#0ff}
  .active-job{padding:6px 0;border-bottom:1px solid #0f3460aa}
  .active-job:last-child{border-bottom:none}
  .job-cmd{color:#34d399;font-size:12px}
  .job-meta{color:#888;font-size:11px}
  .cron-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #0f346055}
  .cron-item:last-child{border-bottom:none}
  .cron-time{color:#fbbf24;min-width:80px}
  .cron-name{color:#e0e0e0}
  .error-item{padding:6px 0;border-bottom:1px solid #0f346055}
  .error-item:last-child{border-bottom:none}
  .error-time{color:#888;font-size:11px}
  .error-source{color:#f87171;font-weight:bold}
  .error-msg{color:#e0e0e0;font-size:12px}
  .empty{color:#666;font-style:italic;padding:8px 0}
  .refresh-indicator{color:#0ff;font-size:10px}
  .reading{color:#fbbf24;font-style:italic}
  #status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#34d399;margin-right:6px;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<h1>OPENCLAW MISSION CONTROL</h1>
<div class="subtitle"><span id="status-dot"></span>Live - auto-refresh every 10s - <span id="last-update">loading...</span></div>

<div id="active-jobs" class="card">
  <div class="card-header">Active Jobs <span class="refresh-indicator" id="active-count">...</span></div>
  <div class="card-body"><div class="reading">Loading...</div></div>
</div>

<div id="db-pulse" class="card">
  <div class="card-header">Database Pulse</div>
  <div class="card-body"><div class="reading">Loading...</div></div>
</div>

<div id="system" class="card">
  <div class="card-header">System Resources</div>
  <div class="card-body"><div class="reading">Loading...</div></div>
</div>

<div id="scraper-health" class="card">
  <div class="card-header">Scraper Health</div>
  <div class="card-body"><div class="reading">Loading...</div></div>
</div>

<div id="cron-schedule" class="card">
  <div class="card-header">Upcoming (next 12h)</div>
  <div class="card-body"><div class="reading">Loading...</div></div>
</div>

<div id="job-history" class="card">
  <div class="card-header">Job History (last 24h)</div>
  <div class="card-body"><div class="reading">Loading...</div></div>
</div>

<div id="errors" class="card">
  <div class="card-header">Recent Errors <span class="refresh-indicator" id="error-count">...</span></div>
  <div class="card-body"><div class="reading">Loading...</div></div>
</div>

<script>
function fmt(n) { return n != null ? n.toLocaleString() : '-'; }
function timeAgo(iso) {
  if (!iso) return 'never';
  const ms = Date.now() - new Date(iso + (iso.endsWith('Z') ? '' : 'Z')).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ' + (mins % 60) + 'm ago';
  return Math.floor(hrs / 24) + 'd ago';
}
function fmtMins(m) {
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
}
function barColor(pct) { return pct > 80 ? 'bar-red' : pct > 60 ? 'bar-yellow' : 'bar-green'; }

function renderActiveJobs(jobs) {
  const el = document.querySelector('#active-jobs .card-body');
  document.getElementById('active-count').textContent = jobs.length + ' running';
  if (!jobs.length) { el.innerHTML = '<div class="empty">IDLE - no jobs running</div>'; return; }
  el.innerHTML = jobs.map(j => `
    <div class="active-job">
      <div class="job-cmd">${esc(j.cmd)}</div>
      <div class="job-meta">PID ${j.pid} - CPU ${j.cpu}% - MEM ${j.mem}% - elapsed ${j.elapsed}</div>
    </div>
  `).join('');
}

function renderDbPulse(p) {
  const el = document.querySelector('#db-pulse .card-body');
  el.innerHTML = `<div class="stat-grid">
    <div class="stat-item"><div class="stat-label">Canonical Ingredients</div><div class="stat-value highlight">${fmt(p.canonical)}</div></div>
    <div class="stat-item"><div class="stat-label">Current Prices</div><div class="stat-value">${fmt(p.prices)}</div></div>
    <div class="stat-item"><div class="stat-label">Coverage</div><div class="stat-value">${p.coverage}%</div></div>
    <div class="stat-item"><div class="stat-label">Price Changes (7d)</div><div class="stat-value">${fmt(p.changes7d)}</div></div>
    <div class="stat-item"><div class="stat-label">Freshest Price</div><div class="stat-value">${timeAgo(p.freshest)}</div></div>
    <div class="stat-item"><div class="stat-label">Stalest Price</div><div class="stat-value">${timeAgo(p.stalest)}</div></div>
    <div class="stat-item"><div class="stat-label">Catalog Products</div><div class="stat-value">${fmt(p.catalogProducts)}</div></div>
    <div class="stat-item"><div class="stat-label">Stores Tracked</div><div class="stat-value">${fmt(p.stores)}</div></div>
    <div class="stat-item"><div class="stat-label">Unack Anomalies</div><div class="stat-value" style="color:#f87171">${fmt(p.anomalies)}</div></div>
  </div>`;
}

function renderSystem(s) {
  const el = document.querySelector('#system .card-body');
  el.innerHTML = `<div class="stat-grid">
    <div class="stat-item">
      <div class="stat-label">CPU (${s.cpuCores} cores)</div>
      <div class="stat-value">${s.cpuPct}%</div>
      <div class="bar-container"><div class="bar-fill ${barColor(s.cpuPct)}" style="width:${Math.min(s.cpuPct,100)}%"></div></div>
    </div>
    <div class="stat-item">
      <div class="stat-label">RAM</div>
      <div class="stat-value">${s.memUsedGB} / ${s.memTotalGB} GB</div>
      <div class="bar-container"><div class="bar-fill ${barColor(s.memPct)}" style="width:${s.memPct}%"></div></div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Disk</div>
      <div class="stat-value">${s.diskUsedGB} / ${s.diskTotalGB} GB</div>
      <div class="bar-container"><div class="bar-fill ${barColor(s.diskPct)}" style="width:${s.diskPct}%"></div></div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Uptime</div>
      <div class="stat-value">${esc(s.uptime || 'unknown')}</div>
    </div>
    ${s.tempC != null ? `<div class="stat-item"><div class="stat-label">Temperature</div><div class="stat-value">${s.tempC}C</div></div>` : ''}
  </div>`;
}

function renderScraperHealth(scrapers) {
  const el = document.querySelector('#scraper-health .card-body');
  if (!scrapers.length) { el.innerHTML = '<div class="empty">No scraper data yet</div>'; return; }
  el.innerHTML = `<table>
    <tr><th>Status</th><th>Scraper</th><th>Last Run</th><th>Found</th><th>Runs</th><th>Errors</th></tr>
    ${scrapers.map(s => `<tr>
      <td><span class="badge badge-${s.status}">${s.status.toUpperCase()}</span></td>
      <td>${esc(s.scraper_name)}</td>
      <td>${timeAgo(s.last_run)}</td>
      <td>${fmt(s.total_found)}</td>
      <td>${s.total_runs}</td>
      <td>${s.error_runs > 0 ? '<span style="color:#f87171">' + s.error_runs + '</span>' : '0'}</td>
    </tr>`).join('')}
  </table>`;
}

function renderCronSchedule(entries) {
  const el = document.querySelector('#cron-schedule .card-body');
  if (!entries.length) { el.innerHTML = '<div class="empty">No scheduled jobs in next 12 hours</div>'; return; }
  el.innerHTML = entries.map(e => `
    <div class="cron-item">
      <span class="cron-time">In ${fmtMins(e.minutesUntil)}</span>
      <span class="cron-name">${esc(e.name)}</span>
    </div>
  `).join('');
}

function renderJobHistory(jobs) {
  const el = document.querySelector('#job-history .card-body');
  if (!jobs.length) { el.innerHTML = '<div class="empty">No job history yet</div>'; return; }
  el.innerHTML = `<table>
    <tr><th></th><th>Time</th><th>Scraper</th><th>Duration</th><th>Found</th><th>New</th><th>Updated</th></tr>
    ${jobs.map(j => {
      const ok = j.errors === 0;
      return `<tr>
        <td><span class="badge badge-${ok ? 'pass' : 'fail'}">${ok ? 'PASS' : 'FAIL'}</span></td>
        <td>${timeAgo(j.started_at)}</td>
        <td>${esc(j.scraper_name)}</td>
        <td>${j.duration_seconds ? j.duration_seconds + 's' : '-'}</td>
        <td>${fmt(j.products_found)}</td>
        <td>${fmt(j.products_new)}</td>
        <td>${fmt(j.products_updated)}</td>
      </tr>`;
    }).join('')}
  </table>`;
}

function renderErrors(errors) {
  const el = document.querySelector('#errors .card-body');
  document.getElementById('error-count').textContent = errors.length + ' total';
  if (!errors.length) { el.innerHTML = '<div class="empty">No errors - all clear</div>'; return; }
  el.innerHTML = errors.slice(0, 20).map(e => `
    <div class="error-item">
      <span class="error-time">${timeAgo(e.started_at)}</span>
      <span class="error-source">${esc(e.scraper_name)}</span>:
      <span class="error-msg">${esc((e.error_details || 'Unknown error').substring(0, 200))}</span>
    </div>
  `).join('');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function refresh() {
  try {
    const res = await fetch('/api/status');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    renderActiveJobs(data.activeJobs || []);
    renderDbPulse(data.databasePulse || {});
    renderSystem(data.systemResources || {});
    renderScraperHealth(data.scraperHealth || []);
    renderCronSchedule(data.cronSchedule || []);
    renderJobHistory(data.jobHistory || []);
    renderErrors(data.recentErrors || []);
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
    document.getElementById('status-dot').style.background = '#34d399';
  } catch (e) {
    document.getElementById('last-update').textContent = 'ERROR: ' + e.message;
    document.getElementById('status-dot').style.background = '#f87171';
  }
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
