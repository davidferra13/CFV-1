name: CI

on:
  push:
    branches: [main, feature/**, fix/**]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Type Check + Lint
  # Fast quality gate — runs in parallel with build
  # ─────────────────────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck

      - name: ESLint
        run: npx next lint --max-warnings 0

      - name: Notification audit (strict required actions)
        run: npm run audit:notifications:strict

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2a: Critical Tests (financial, FSM, auth — must always pass)
  # ─────────────────────────────────────────────────────────────────────────────
  critical-tests:
    name: Critical Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run critical tests (financial, FSM, quotes, auth)
        run: npm run test:critical

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2b: Unit Tests (all)
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test:unit

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build Check
  # Verifies the production build compiles without errors
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [type-check, critical-tests]

    env:
      # Minimal env vars required for a successful Next.js build
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      # Prevent Sentry from trying to upload source maps during CI build
      SENTRY_AUTH_TOKEN: ''

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npx next build --no-lint

      - name: Upload build artifact (optional, for smoke tests)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: next-build
          path: .next/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Smoke Tests (Playwright)
  # Runs on PRs to main only — requires build to succeed first
  # Full E2E tests are run manually against staging
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    # Only run smoke tests on PRs to main (not on every push to feature branches)
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      SUPABASE_E2E_ALLOW_REMOTE: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/

      - name: Start Next.js server
        run: npx next start -p 3100 &
        env:
          PORT: 3100

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3100 --timeout 30000

      - name: Run smoke tests
        run: npx playwright test --project=smoke

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7
