# Standalone PostgreSQL for ChefFlow
# Replaces Supabase Docker (PostgREST, GoTrue, Storage, Realtime no longer needed)
# Usage: docker compose up -d
# Connection: postgresql://postgres:postgres@127.0.0.1:54322/postgres

version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: chefflow_postgres
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - chefflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chefflow_pgdata:
