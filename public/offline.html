<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ChefFlow — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
      background-color: #faf9f7;
      color: #1c1917;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem env(safe-area-inset-right, 0) 2rem env(safe-area-inset-left, 0);
      padding-top: calc(2rem + env(safe-area-inset-top, 0px));
      padding-bottom: calc(2rem + env(safe-area-inset-bottom, 0px));
    }

    .card {
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.5rem;
      background: #fff7ed;
      border: 2px solid #fed7aa;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 32px;
      height: 32px;
      color: #e88f47;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1c1917;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1rem;
      color: #57534e;
      line-height: 1.6;
      margin-bottom: 0.75rem;
    }

    .safe-notice {
      font-size: 0.875rem;
      color: #16a34a;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .safe-notice svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    button {
      background: #e88f47;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1.5rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
    }

    button:hover { background: #d47530; }
    button:active { background: #b15c26; }

    .wordmark {
      margin-top: 2.5rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #a8a29e;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .auto-reload {
      display: none;
      margin-top: 1rem;
      font-size: 0.8125rem;
      color: #57534e;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p class="subtitle">This page couldn't be loaded from cache.</p>

    <div class="safe-notice">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
      </svg>
      Your work is saved locally and will sync automatically.
    </div>

    <button onclick="window.location.reload()">Retry Connection</button>

    <p class="auto-reload" id="auto-reload">Reconnecting automatically...</p>
    <p class="wordmark">ChefFlow</p>
  </div>

  <script>
    window.addEventListener('online', function() {
      document.getElementById('auto-reload').style.display = 'block';
      setTimeout(function() { window.location.reload(); }, 1500);
    });
  </script>
</body>
</html>
