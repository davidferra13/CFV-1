<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ChefFlow — You're Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
      background-color: #111827;
      color: #f9fafb;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem env(safe-area-inset-right, 0) 2rem env(safe-area-inset-left, 0);
      padding-top: calc(2rem + env(safe-area-inset-top, 0px));
      padding-bottom: calc(2rem + env(safe-area-inset-bottom, 0px));
    }

    .card {
      text-align: center;
      max-width: 320px;
      width: 100%;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: #1f2937;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 32px;
      height: 32px;
      color: #d47530;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f9fafb;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 0.9375rem;
      color: #9ca3af;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    button {
      background: #d47530;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1.5rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
    }

    button:hover { background: #b15c26; }
    button:active { background: #8e4a24; }

    .wordmark {
      margin-top: 2.5rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #4b5563;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>Reconnect to the internet to continue using ChefFlow.</p>
    <button onclick="window.location.reload()">Try Again</button>
    <p class="wordmark">ChefFlow</p>
  </div>
</body>
</html>
