# =============================================================================
# ChefFlow Beta — Cloudflare Tunnel Configuration
# =============================================================================
# This config is used by the named tunnel (beta.cheflowhq.com).
# Quick tunnels (random URL) don't use this file.
#
# Setup (one-time):
#   1. cloudflared tunnel login        → authorize with Cloudflare
#   2. cloudflared tunnel create chefflow-beta-pc  → creates the tunnel
#   3. cloudflared tunnel route dns chefflow-beta-pc beta.cheflowhq.com
#
# Run:
#   npm run beta:named
# =============================================================================

tunnel: f38df8e8-3b6d-463d-b39b-a9265ea5ebcd
credentials-file: C:\Users\david\.cloudflared\f38df8e8-3b6d-463d-b39b-a9265ea5ebcd.json

ingress:
  - hostname: beta.cheflowhq.com
    service: http://localhost:3200
    originRequest:
      noTLSVerify: true
  # Catch-all rule (required by cloudflared)
  - service: http_status:404
